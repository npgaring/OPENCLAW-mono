<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OpenClaw Governed Builder Console</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #061126;
        color: #e6edf8;
        display: grid;
        min-height: 100vh;
        place-items: center;
      }
      .card {
        max-width: 520px;
        padding: 32px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: rgba(7, 17, 33, 0.9);
        text-align: center;
      }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      a { color: #22d3ee; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>OpenClaw Governed Builder Console</h1>
      <p>The frontend is built from <code>frontend/</code> via Vite and served by Vercel's static build.</p>
      <p>If you see this page, the static build has not been deployed yet.</p>
      <p>Local dev: <code>cd frontend && npm install && npm run dev</code></p>
    </main>
  </body>
</html>
