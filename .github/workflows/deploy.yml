# Deploy to Vercel on push to main. To enable:
# 1. In repo Settings → Secrets and variables → Actions, add:
#    - VERCEL_TOKEN (from Vercel: Account Settings → Tokens)
# 2. Optional: VERCEL_ORG_ID, VERCEL_PROJECT_ID (from project .vercel/project.json or Vercel dashboard)
# 3. Create variable ENABLE_DEPLOY = true
# Until then, this workflow is skipped so pushes to main don't fail.
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-prod:
    if: vars.ENABLE_DEPLOY == 'true'
    environment: Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Retry up to 3 times; Vercel sometimes returns "Unexpected error. Please try again later" during build
      - name: Deploy to Vercel (production)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          root="${{ vars.VERCEL_ROOT_DIR || '.' }}"
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3..."
            if (cd "$root" && npx vercel@25.1.0 --prod --token "$VERCEL_TOKEN"); then
              echo "Deploy succeeded."
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed, retrying in 90s..."
              sleep 90
            fi
          done
          echo "Deploy failed after 3 attempts."
          echo "→ Check the 'Inspect:' URL in the log above (Vercel dashboard) for the real build error under Build / Logs."
          exit 1
