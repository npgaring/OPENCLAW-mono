# Deploy to Vercel on push to main. To enable:
# 1. In repo Settings → Secrets and variables → Actions, add:
#    - VERCEL_TOKEN (from Vercel: Account Settings → Tokens)
# 2. Optional: VERCEL_ORG_ID, VERCEL_PROJECT_ID (from project .vercel/project.json or Vercel dashboard)
# 3. Create variable ENABLE_DEPLOY = true
# Until then, this workflow is skipped so pushes to main don't fail.
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-prod:
    if: vars.ENABLE_DEPLOY == 'true'
    environment: Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          working-directory: ${{ vars.VERCEL_ROOT_DIR || '.' }}
          scope: ${{ vars.VERCEL_ORG_ID || '' }}
